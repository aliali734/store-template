<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details</title>

  <link rel="stylesheet" href="header.css" />
  <link rel="stylesheet" href="product.css" />
</head>
<body>
  <div id="header"></div>

  <main class="product-page">
    <div class="product-image-wrap">
      <div class="main-image">
        <img
          id="product-img"
          src="https://via.placeholder.com/400"
          alt="Product Image"
        />
      </div>
      <div class="thumbnails"></div>
    </div>

    <div class="product-info-wrap">
      <h1 id="product-name">Product Name</h1>
      <p id="product-category" class="product-category-text">Category</p>
      <p id="product-price" class="product-price-text">$0</p>
      <p id="product-description">Product description goes here...</p>

      <div class="product-actions">
        <input type="number" id="product-quantity" min="1" value="1" />
        <button id="add-to-cart-btn" type="button">Add to Cart</button>
      </div>
    </div>
  </main>

  <section class="related-products">
    <h2>Related Products</h2>
    <div id="related-container"></div>
  </section>
  <footer class="site-footer">
  <div class="footer-inner">
    <p id="footer-text">© Clothing Store. All rights reserved.</p>

    <div class="footer-socials">
      <a id="social-facebook" href="#" target="_blank" rel="noopener" style="display:none;">Facebook</a>
      <a id="social-instagram" href="#" target="_blank" rel="noopener" style="display:none;">Instagram</a>
      <a id="social-tiktok" href="#" target="_blank" rel="noopener" style="display:none;">TikTok</a>
      <a id="social-twitter" href="#" target="_blank" rel="noopener" style="display:none;">X</a>
      <a id="social-whatsapp" href="#" target="_blank" rel="noopener" style="display:none;">WhatsApp</a>
    </div>
  </div>
</footer>
  <script src="header.js"></script>
  <script src="onboarding.js"></script>
  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="product.js"></script>
</body>
</html>
