<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/components/header.css">
  <link rel="stylesheet" href="css/product.css">
</head>
<body>

  <!-- HEADER -->
  <div id="header"></div>

  <!-- PRODUCT DETAILS -->
  <main style="max-width:1280px; margin:24px auto; display:flex; flex-wrap:wrap; gap:32px;">

    <!-- Product Image + Thumbnails -->
    <div class="product-image" style="flex:1; min-width:300px;">
      <div class="main-image">
        <img id="product-img" src="https://via.placeholder.com/400" alt="Product Image">
      </div>
      <div class="thumbnails"></div>
    </div>

    <!-- Product Info -->
    <div class="product-info" style="flex:1; min-width:300px; display:flex; flex-direction:column; gap:16px;">
      <h1 id="product-name">Product Name</h1>
      <p id="product-category" style="color:gray;">Category</p>
      <p id="product-price" style="font-weight:bold; font-size:20px;">$0</p>
      <p id="product-description">Product description goes here...</p>

      <div class="product-actions" style="display:flex; gap:16px; align-items:center;">
        <input type="number" id="product-quantity" min="1" value="1">
        <button id="add-to-cart-btn">Add to Cart</button>
      </div>
    </div>
  </main>

  <!-- Related Products Section -->
  <section class="related-products" style="max-width:1280px; margin:48px auto;">
    <h2 style="margin-bottom:16px;">Related Products</h2>
    <div id="related-container" style="display:flex; flex-wrap:wrap; gap:24px;">
      <!-- المنتجات المرتبطة سيتم إدراجها ديناميكيًا -->
    </div>
  </section>

  <!-- Toast notifications -->
  <style>
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: black;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 5000;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    .toast.error { background: #dc2626; }
    .toast.info { background: #2563eb; }
  </style>

  <!-- JS -->
  <script src="product.js"></script>
</body>
</html>
