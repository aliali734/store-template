<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <aside class="sidebar">
    <h2>Admin Panel</h2>
    <ul>
      <li><a href="#" data-section="dashboard">Dashboard</a></li>
      <li><a href="#" data-section="products">Products</a></li>
      <li><a href="#" data-section="orders">Orders</a></li>
      <li><button type="button" id="openHeaderModal">Header Settings</button></li>
      <li><button type="button" id="logoutBtn">Logout</button></li>
    </ul>
  </aside>

  <main class="main">
    <!-- LOGIN SECTION -->
    <section id="login-section">
      <h1>Admin Login</h1>
      <form id="login-form">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
      <p id="login-message"></p>
    </section>

    <!-- DASHBOARD SECTION -->
    <section id="dashboard-section" class="hidden">
      <h1>Dashboard</h1>

      <div class="stats-cards">
        <div class="card">
          <h3>Products</h3>
          <p>Manage all store products</p>
        </div>
        <div class="card">
          <h3>Orders</h3>
          <p>View and update customer orders</p>
        </div>
        <div class="card">
          <h3>Header</h3>
          <p>Update logo settings safely</p>
        </div>
      </div>
    </section>

    <!-- PRODUCTS SECTION -->
    <section class="products-section hidden">
      <h2>Products</h2>
      <button type="button" id="openAddProduct">Add Product</button>

      <div class="table-wrapper">
        <table class="products-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Department</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsBody"></tbody>
        </table>
      </div>
    </section>

    <!-- ORDERS SECTION -->
    <section id="orders-section" class="hidden"></section>
  </main>

  <!-- OVERLAY -->
  <div id="overlay" class="overlay hidden"></div>

  <!-- PRODUCT MODAL -->
  <div id="productModal" class="modal hidden">
    <div class="modal-header">
      <h2 id="modalTitle">Add Product</h2>
      <button type="button" id="closeModal">&times;</button>
    </div>

    <form id="product-form">
      <input type="hidden" id="productId" />

      <label for="name">Name</label>
      <input type="text" id="name" required />

      <label for="description">Description</label>
      <textarea id="description"></textarea>

      <label for="brand">Brand</label>
      <input type="text" id="brand" />

      <label for="department">Department</label>
      <select id="department" required>
        <option value="">Select department</option>
      </select>

      <label for="category">Category</label>
      <select id="category" required>
        <option value="">Select category</option>
      </select>

      <label for="audience">Audience</label>
      <select id="audience" required>
        <option value="men">Men</option>
        <option value="women">Women</option>
        <option value="kids">Kids</option>
        <option value="unisex">Unisex</option>
      </select>

      <label for="price">Price</label>
      <input type="number" id="price" min="0" step="0.01" required />

      <label for="compareAtPrice">Compare At Price</label>
      <input type="number" id="compareAtPrice" min="0" step="0.01" />

      <label for="stock">Stock</label>
      <input type="number" id="stock" min="0" required />

      <label for="sizes">Sizes</label>
      <select id="sizes" multiple required>
        <option value="XS">XS</option>
        <option value="S">S</option>
        <option value="M">M</option>
        <option value="L">L</option>
        <option value="XL">XL</option>
      </select>

      <label for="colors">Colors</label>
      <select id="colors" multiple required>
        <option value="black">Black</option>
        <option value="white">White</option>
        <option value="blue">Blue</option>
        <option value="red">Red</option>
        <option value="green">Green</option>
        <option value="gray">Gray</option>
        <option value="beige">Beige</option>
        <option value="brown">Brown</option>
      </select>

      <label for="image">Images</label>
      <input type="file" id="image" multiple accept="image/*" />

      <label>
        <input type="checkbox" id="featured" />
        Featured
      </label>

      <label>
        <input type="checkbox" id="isActive" checked />
        Active
      </label>

      <p id="message"></p>
      <button type="submit" id="submitBtn">Save</button>
    </form>
  </div>

  <!-- HEADER MODAL -->
  <div id="headerModal" class="modal hidden">
    <div class="modal-header">
      <h2>Header Settings</h2>
      <button type="button" id="closeHeaderModal">&times;</button>
    </div>

    <form id="header-form">
      <label for="header-logo">Header Logo</label>
      <input type="file" id="header-logo" accept="image/*" />
      <img
        id="logoPreview"
        src=""
        alt="Logo Preview"
        style="max-width: 140px; max-height: 80px;"
      />

      <label for="header-categories">Mega Menu</label>
      <textarea
        id="header-categories"
        rows="4"
        readonly
        disabled
      >Mega menu structure is managed from backend defaults / database. Logo can be updated here only.</textarea>

      <p id="headerMessage"></p>
      <button type="submit">Save Logo</button>
    </form>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="admin-orders.js"></script>
  <script src="admin.js"></script>
</body>
</html>
