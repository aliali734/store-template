<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <aside class="sidebar">
    <h2>Admin Panel</h2>
    <ul>
      <li><a href="#" data-section="dashboard">Dashboard</a></li>
      <li><a href="#" data-section="products">Products</a></li>
      <li><a href="#" data-section="orders">Orders</a></li>
      <li><button id="openHeaderModal" type="button">Edit Header</button></li>
      <li><button id="logoutBtn" type="button">Logout</button></li>
    </ul>
  </aside>

  <main class="main">
    <section id="login-section">
      <h2>Admin Login</h2>
      <form id="login-form">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
      <p id="login-message"></p>
    </section>

    <section id="dashboard-section" class="hidden">
      <button id="openAddProduct" type="button">➕ Add Product</button>

      <div id="overlay" class="overlay hidden"></div>

      <div id="productModal" class="modal hidden">
        <div class="modal-header">
          <h2 id="modalTitle">Add Product</h2>
          <button id="closeModal" type="button">&times;</button>
        </div>

        <form id="product-form" enctype="multipart/form-data">
          <input type="hidden" id="productId" />

          <input type="text" id="name" placeholder="Product name" required />
          <textarea id="description" placeholder="Description" required></textarea>

          <label for="brand">Brand</label>
          <select id="brand" required>
            <option value="">Select brand</option>
            <option value="nike">Nike</option>
            <option value="adidas">Adidas</option>
            <option value="zara">Zara</option>
            <option value="hm">H&amp;M</option>
            <option value="puma">Puma</option>
            <option value="other">Other</option>
          </select>

          <label for="audience">Audience</label>
          <select id="audience">
            <option value="unisex">Unisex</option>
            <option value="men">Men</option>
            <option value="women">Women</option>
            <option value="kids">Kids</option>
          </select>

          <label for="department">Department</label>
          <select id="department" required>
            <option value="">Select department</option>
          </select>

          <label for="category">Category</label>
          <select id="category" required>
            <option value="">Select category</option>
          </select>

          <input type="number" id="price" placeholder="Price" required />
          <input type="number" id="compareAtPrice" placeholder="Compare at price" />
          <input type="number" id="stock" placeholder="Stock" required />

          <label for="sizes">Sizes</label>
          <select id="sizes" multiple>
            <option value="XS">XS</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
            <option value="XXL">XXL</option>
          </select>

          <label for="colors">Colors</label>
          <select id="colors" multiple>
            <option value="black">Black</option>
            <option value="white">White</option>
            <option value="gray">Gray</option>
            <option value="blue">Blue</option>
            <option value="red">Red</option>
            <option value="green">Green</option>
            <option value="beige">Beige</option>
            <option value="brown">Brown</option>
          </select>

          <label>
            <input type="checkbox" id="featured" />
            Featured product
          </label>

          <label>
            <input type="checkbox" id="isActive" checked />
            Active
          </label>

          <input type="file" id="image" accept="image/*" multiple />

          <button type="submit" id="submitBtn">Save</button>
          <p id="message"></p>
        </form>
      </div>

      <div id="headerModal" class="modal hidden">
        <div class="modal-header">
          <h2>Edit Header</h2>
          <button id="closeHeaderModal" type="button">&times;</button>
        </div>

        <form id="header-form" enctype="multipart/form-data">
          <label for="header-logo">Logo:</label>
          <input type="file" id="header-logo" accept="image/*" />
          <img id="logoPreview" src="" alt="Logo Preview" width="80" />

          <label for="header-categories">Categories (comma separated):</label>
          <input
            type="text"
            id="header-categories"
            placeholder="Category1, Category2"
          />

          <button type="submit">Save Header</button>
          <p id="headerMessage"></p>
        </form>
      </div>

      <section class="products-section">
        <h2>Products</h2>
        <div class="table-wrapper">
          <table class="products-table">
            <thead>
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Department</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="productsBody"></tbody>
          </table>
        </div>
      </section>
    </section>

    <section id="orders-section" class="hidden">
      <h2>Orders</h2>
      <div id="ordersTable"></div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="admin.js"></script>
  <script src="admin-orders.js"></script>
</body>
</html>
