<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complete Payment</title>

  <link rel="stylesheet" href="header.css" />
  <link rel="stylesheet" href="payment.css" />
</head>
<body>
  <div id="header"></div>

  <main class="payment-page">
    <div class="payment-box">
      <h1>Complete Your Payment</h1>
      <p id="payment-status" class="payment-status">Loading payment details...</p>

      <div id="payment-summary" class="payment-summary hidden">
        <p><strong>Amount:</strong> <span id="payment-amount"></span></p>
        <p><strong>Currency:</strong> <span id="payment-currency"></span></p>
        <p><strong>Method:</strong> <span id="payment-method-label"></span></p>
        <p><strong>Provider:</strong> <span id="payment-provider"></span></p>
      </div>

      <div class="payment-actions">
        <button id="pay-now-btn" type="button" class="pay-btn hidden">
          Pay Now
        </button>
        <a href="shop.html" class="back-link">Back to Shop</a>
      </div>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="header.js"></script>
  <script src="onboarding.js"></script>
  <script src="payment-page.js"></script>
</body>
</html>
