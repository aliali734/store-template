<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password</title>
  <link rel="stylesheet" href="header.css" />
  <link rel="stylesheet" href="forgot-password.css" />
</head>
<body>
  <div id="header"></div>

  <main class="auth-page">
    <div class="auth-box">
      <h2>Forgot Password</h2>
      <p>Enter your email and we’ll send you a reset link.</p>

      <form id="forgot-form">
        <input type="email" id="email" placeholder="Email" required />
        <button type="submit" id="btn">Send reset link</button>
        <p id="msg" class="msg"></p>
      </form>

      <a href="login.html" class="back-link">Back to Login</a>
    </div>
  </main>
  <footer class="site-footer">
  <div class="footer-inner">
    <p id="footer-text">© Clothing Store. All rights reserved.</p>

    <div class="footer-socials">
      <a id="social-facebook" href="#" target="_blank" rel="noopener" style="display:none;">Facebook</a>
      <a id="social-instagram" href="#" target="_blank" rel="noopener" style="display:none;">Instagram</a>
      <a id="social-tiktok" href="#" target="_blank" rel="noopener" style="display:none;">TikTok</a>
      <a id="social-twitter" href="#" target="_blank" rel="noopener" style="display:none;">X</a>
      <a id="social-whatsapp" href="#" target="_blank" rel="noopener" style="display:none;">WhatsApp</a>
    </div>
  </div>
</footer>
  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="forgot-password.js"></script>
</body>
</html>
