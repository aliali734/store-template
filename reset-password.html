<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="header.css" />
  <link rel="stylesheet" href="reset-password.css" />
</head>
<body>
  <div id="header"></div>

  <main class="auth-page">
    <div class="auth-box">
      <h2>Reset Password</h2>
      <p>Choose a new password.</p>

      <form id="reset-form">
        <input type="password" id="newPassword" placeholder="New password" required />
        <input type="password" id="confirmPassword" placeholder="Confirm new password" required />
        <button type="submit" id="btn">Reset Password</button>
        <p id="msg" class="msg"></p>
        <small id="hint"></small>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p id="footer-text">© Clothing Store. All rights reserved.</p>

      <div class="footer-socials">
        <a id="social-facebook" href="#" target="_blank" rel="noopener" style="display:none;">Facebook</a>
        <a id="social-instagram" href="#" target="_blank" rel="noopener" style="display:none;">Instagram</a>
        <a id="social-tiktok" href="#" target="_blank" rel="noopener" style="display:none;">TikTok</a>
        <a id="social-twitter" href="#" target="_blank" rel="noopener" style="display:none;">X</a>
        <a id="social-whatsapp" href="#" target="_blank" rel="noopener" style="display:none;">WhatsApp</a>
      </div>
    </div>
  </footer>

  <!-- Script loading order:
       1. config.js          — API_BASE, SERVER_BASE, shared utilities (must be first)
       2. api.js             — apiFetch, getStoreSettings (depends on config.js)
       3. header.js          — calls apiFetch + API_BASE on DOMContentLoaded
                               (must come after config.js and api.js)
       4. reset-password.js  — page logic, depends on config.js and api.js
       Note: onboarding.js is intentionally omitted — this page is reached
       via an email link and must be accessible regardless of setup state.
  -->
  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="header.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>
