<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Admin Account</title>
  <link rel="stylesheet" href="setup-admin.css" />
</head>
<body>
  <main class="setup-page">
    <div class="setup-box">
      <h1>Create Admin Account</h1>
      <p>Set up the first administrator for your store.</p>

      <form id="setup-admin-form">
        <label for="name">Full Name</label>
        <input type="text" id="name" required />

        <label for="email">Email</label>
        <input type="email" id="email" required />

        <label for="password">Password</label>
        <input type="password" id="password" required />

        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" required />

        <p id="setup-admin-message"></p>
        <button type="submit" id="setup-admin-btn">Create Admin</button>
      </form>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="setup-admin.js"></script>
</body>
</html>
